<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card: #1e2937;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            margin-bottom: 12px;
            background: linear-gradient(to right, #c7d2fe, #e0e7ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .menu-btn {
            background: var(--card);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--text);
            padding: 28px 24px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .menu-btn:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.25);
            background: #334155;
        }

        .menu-btn:active {
            transform: scale(0.97);
        }

        .icon {
            font-size: 2.8rem;
            margin-bottom: 8px;
            transition: transform 0.3s ease;
        }

        .menu-btn:hover .icon {
            transform: scale(1.15);
        }

        .footer {
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ message }}</h1>
            <p>Mylocalcloud</p>
        </div>

        <div class="menu-grid">
            <a href="#" class="menu-btn">
                <div class="icon">📊</div>
                <div>Статистика</div>
            </a>

            <a href="#" class="menu-btn">
                <div class="icon">☁️</div>
                <div>Аккаунты</div>
            </a>

            <a href="http://127.0.0.1:8000/files" class="menu-btn">
                <div class="icon">📁</div>
                <div>Хранилище</div>
            </a>

            <a href="#" class="menu-btn">
                <div class="icon">⚙️</div>
                <div>Пока не придумал</div>
            </a>

            <a href="#" class="menu-btn">
                <div class="icon">👤</div>
                <div>Профиль</div>
            </a>
        </div>
    </div>
</body>
</html>
